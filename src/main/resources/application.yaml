spring:
  application:
    name: pos-dashboard-api

  datasource:
    url: jdbc:postgresql://localhost:5432/pos_dashboard_db
    username: pos_dashboard_user
    password: password123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: 8000

file:
  upload-dir: uploads

jwt:
  secret: pos-dashboard-super-secret
  access-token-expiration: 86400000          # 1 hari
  refresh-token-expiration: 604800000        # 7 hari